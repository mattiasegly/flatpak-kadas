name: sqlite
sources:
  - type: git
    url: https://github.com/sqlite/sqlite.git
    tag: version-3.53.3
    commit: 92a6c5c3636faa021ecc3be5403a00f50f65eda7
    x-checker-data:
      type: git
      tag-pattern: version-([\d.]+)$
buildsystem: simple
builddir: true
build-commands:
  - CFLAGS="-DSQLITE_ENABLE_COLUMN_METADATA=1" ./configure --prefix=/app --disable-static
    --enable-all #enable-all is only; fts4/5 geopoly rtree session
  - make
  - make install
