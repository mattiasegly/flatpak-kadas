name: qgis
sources:
  - type: git
    url: https://github.com/qgis/QGIS.git
    commit: 2beb446a1dcb04e6e9c3490e1e1e138367664374 #see /kadas-albireo2/vcpkg/ports/qgis/portfile.cmake

  - type: file
    url: https://github.com/kadas-albireo/kadas-albireo2/raw/refs/heads/main/vcpkg/ports/qgis/mesh.patch
    sha256: 6e8a19b92b81d477672951eb8f8323dfab914ed1ab1dce1a5e56bab43e42d223

  - type: file
    url: https://github.com/kadas-albireo/kadas-albireo2/raw/refs/heads/main/vcpkg/ports/qgis/3dfrustumfix.patch
    sha256: df894e88e92d4504c8c9a9fbf2f728552f1dffe445596544e71a05252c92e3ce

  - type: file
    url: https://github.com/kadas-albireo/kadas-albireo2/raw/refs/heads/main/vcpkg/ports/qgis/3dchunkloaderconcurrency.patch
    sha256: 7f1d0b9b774b11c5e3d640dbcc33cc18d05498ae4ba969af7300b4b797edf067

  - type: file
    url: https://github.com/kadas-albireo/kadas-albireo2/raw/refs/heads/main/vcpkg/ports/qgis/flagDegreesUseUntranslatedStringSuffix.patch
    sha256: 9470b0cf904ed2655838a9096005b1e422d5be998c68b8da89dc0372fe0cccdb

  - type: file
    url: https://github.com/kadas-albireo/kadas-albireo2/raw/refs/heads/main/vcpkg/ports/qgis/wcsSpatialExtentSettings.patch
    sha256: 55c6e42d53be436dfa81650d5fd1111329fafffa16fb22720e4f21dd662bd914

  - type: shell
    commands:
      - patch -p1 <mesh.patch
      - patch -p1 <3dfrustumfix.patch
      - patch -p1 <3dchunkloaderconcurrency.patch
      - patch -p1 <flagDegreesUseUntranslatedStringSuffix.patch
      - patch -p1 <wcsSpatialExtentSettings.patch
      - git grep -l '${Python_SITEARCH}' | xargs sed -i 's/\${Python_SITEARCH}/\/app\/lib\/python3.12\/site-packages/g' #crude fix for forcing cmake setting site-packages to /app instead of /usr
      - sed -i 's/sysconfig.get_path.*/"\/app\/lib\/python3.12\/site-packages"/g'
        cmake/FindSIP.py #force install sip files to /app instead of /usr
      - sed -i 's/qgis\/\${module}/qgis\/bindings\/\${module}/g' python/CMakeLists.txt #force install sip files to bindings folder
      - sed -i 's/SET(SIP_CONCAT_PARTS 28)/SET(SIP_CONCAT_PARTS 10)/g' cmake/SIPMacros.cmake #try to "significantly speed up the build"

buildsystem: cmake-ninja
builddir: true
config-opts:
  - -DCMAKE_BUILD_TYPE=Release
  - -DCMAKE_PREFIX_PATH=/app;/usr
  - -DWITH_PDAL=FALSE
  - -DWITH_DRACO=FALSE
  - -DGRASS_PREFIX8=/app/grass84
  - -DBINDINGS_GLOBAL_INSTALL=TRUE #solved with python_sitearch fix
  - -DSIP_GLOBAL_INSTALL=TRUE #installs core.sip
  - -DENABLE_TESTS=FALSE
