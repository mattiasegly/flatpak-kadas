name: protobuf
sources:
  - type: git
    url: https://github.com/protocolbuffers/protobuf.git
    tag: v34.0
    commit: 6a6cd88c262ffdb1738167a47d5fcc7a3eb4edac
    x-checker-data:
      type: git
buildsystem: cmake-ninja
builddir: true #recommended
config-opts:
