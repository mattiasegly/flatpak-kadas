    url: https://github.com/protocolbuffers/protobuf.git
    tag: v35.1
    commit: 35cd01f9fe9afbeea38cc7b979a3b6bfcde82c03
    x-checker-data:
      type: git
buildsystem: cmake-ninja
builddir: true #recommended
