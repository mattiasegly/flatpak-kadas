name: tcl
sources:
  - type: git
    url: https://github.com/tcltk/tcl.git
    tag: core-8-6-18
    commit: 515167c897a7c8066abfbd71e8fe7bd8bf3569de
    x-checker-data:
      type: git
      tag-pattern: core-([\d-]+)$
      versions: {<: '9'}
buildsystem: simple
builddir: true
subdir: unix
build-commands:
  - ./configure --prefix=/app --enable-64bit
  - make
  - make install
post-install:
  - chmod 755 /app/lib/libtcl*.so
