name: openblas
sources:
  - type: git
    url: https://github.com/xianyi/OpenBLAS.git
    tag: v0.3.32
    commit: 8cecf899e21d99f9d8766ed34bfeeb3e2992c844
    x-checker-data:
      type: git
buildsystem: cmake-ninja
builddir: true
config-opts:
  - -DCMAKE_BUILD_TYPE=Release
  - -DCMAKE_PREFIX_PATH=/app;/usr
  - -DCMAKE_Fortran_COMPILER=gfortran
  - -DBUILD_TESTING=OFF
  - -DBUILD_SHARED_LIBS=ON
  - -DDYNAMIC_ARCH=TRUE
