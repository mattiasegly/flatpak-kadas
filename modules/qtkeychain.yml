name: qtkeychain
sources:
  - type: git
    url: https://github.com/frankosterfeld/qtkeychain.git
    tag: 0.17.0
    commit: 875f77d9f61bd97fd84cca47ce3bc71186dfbd09
    x-checker-data:
      type: git
buildsystem: cmake-ninja
builddir: true
config-opts:
  - -DCMAKE_BUILD_TYPE=Release
  - -DCMAKE_PREFIX_PATH=/app;/usr
  - -DBUILD_WITH_QT6=ON
  - -DBUILD_TRANSLATIONS=OFF
