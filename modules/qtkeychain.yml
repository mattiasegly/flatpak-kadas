name: qtkeychain
sources:
  - type: git
    url: https://github.com/frankosterfeld/qtkeychain.git
    tag: 0.16.0
    commit: aa6da344e1a20b9194e12bace3665caeea6b6304
    x-checker-data:
      type: git
buildsystem: cmake-ninja
builddir: true
config-opts:
  - -DCMAKE_BUILD_TYPE=Release
  - -DCMAKE_PREFIX_PATH=/app;/usr
  - -DBUILD_WITH_QT6=ON
  - -DBUILD_TRANSLATIONS=OFF
