name: oras
sources:
  - type: file
    url: https://github.com/oras-project/oras/releases/download/v1.3.1/oras_1.3.1_linux_amd64.tar.gz
    sha256: d52c4af76ce6a3ceb8579e51fb751a43ac051cca67f965f973a0b0e897a2bb86
buildsystem: simple
builddir: true
build-commands:
  - mkdir -p /app/bin/
  - mkdir -p oras-install/
  - tar -zxf oras*.tar.gz -C oras-install/
  - mv oras-install/oras /app/bin/
  - rm -rf oras*.tar.gz oras-install/
